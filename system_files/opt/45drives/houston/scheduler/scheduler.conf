# Houston Scheduler Global Settings
# These values are applied when generating new task service files.
# Existing tasks can be migrated via the UI or by running:
#   python3 /opt/45drives/houston/scheduler/scripts/migrate-retry-settings.py

[retry]
# How long to wait before retrying a failed task (seconds)
restart_sec = 5
# Maximum retry attempts within the interval window
start_limit_burst = 2
# Time window for counting retries (seconds)
start_limit_interval_sec = 15
